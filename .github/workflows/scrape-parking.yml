name: Scrape truck parking availability

on:
  schedule:
    # Hourly, at :23 past. Minute 0 is GitHub's rush hour — scheduled runs
    # there get delayed or skipped under load (we saw 4h gaps), so an odd
    # minute keeps the cadence steady, and hourly firing means one skipped
    # slot costs 1h of gap, not 4. Edit this cron to change frequency.
    - cron: "23 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: scrape-parking
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run scraper
        run: python3 scraper/scrape.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # urls.txt too: the market sweep auto-appends newly discovered listings
          git add scraper/data scraper/urls.txt
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Scrape parking data $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          # Retry push in case another run landed a commit meanwhile
          for i in 1 2 3; do
            git push && exit 0
            git pull --rebase
          done
          git push
